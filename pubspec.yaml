name: bobkasir
description: "BobKasir — Aplikasi POS/Kasir untuk kedai kopi dan makanan."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # UI & fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local DB
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0

  # HTTP
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Charts (dashboard)
  fl_chart: ^0.69.0

  # Image picker (produk)
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Firebase / FCM
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5

  # URL launcher (Midtrans Snap)
  url_launcher: ^6.3.1

  # Connectivity (offline detection)
  connectivity_plus: ^6.1.4

  # Bluetooth printer (ESC/POS)
  flutter_blue_plus: ^1.35.5
  esc_pos_utils_plus: ^2.0.4

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.7
  collection: ^1.19.1
  sqlite3: ^2.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  drift_dev: ^2.23.1

flutter:
  uses-material-design: true
