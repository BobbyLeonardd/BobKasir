name: bobkasir
description: "BobKasir - Aplikasi POS Kasir untuk UMKM oleh StarCyberCompany"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.0.0

  # Navigation
  go_router: ^17.0.0

  # Local Storage
  shared_preferences: ^2.3.3
  sqflite: ^2.4.1
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  device_info_plus: ^13.0.0

  # Network
  dio: ^5.8.0+1
  connectivity_plus: ^7.0.0

  # Bluetooth Printer — mendukung semua thermal printer ESC/POS umum
  blue_thermal_printer: ^1.0.0+3

  # Export
  pdf: ^3.11.1
  printing: ^5.13.2
  excel: ^4.0.6
  open_filex: ^4.7.0

  # UI Helpers
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.20.0
  flutter_svg: ^2.0.17

  # Icons
  cupertino_icons: ^1.0.8

  # Google Sign-In
  google_sign_in: ^7.0.0
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Light.ttf
          weight: 300
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
  assets:
    - assets/fonts/
    - assets/images/
    - assets/icons/
